name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '24'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # The release tag (e.g. "v0.2.0") becomes the published version, stripped of its
      # leading "v" -- ephemeral, not committed back, so pom.xml keeps developing against
      # 0.1.0-SNAPSHOT between releases.
      - name: Set version from release tag
        run: ./mvnw --batch-mode versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DprocessAllModules=true -DgenerateBackupPoms=false

      - name: Publish to GitHub Packages
        run: ./mvnw --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
